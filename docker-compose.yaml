services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume_suite_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:////app/database.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    env_file:
      - .env
    restart: always
